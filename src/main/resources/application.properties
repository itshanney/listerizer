server.port=5080

# Override with LISTERIZER_DB_PATH env var (e.g. LISTERIZER_DB_PATH=/var/data/listerizer.db)
spring.datasource.url=jdbc:sqlite:${LISTERIZER_DB_PATH:${user.home}/listerizer.db}
spring.datasource.driver-class-name=org.sqlite.JDBC

# Run schema.sql on startup (CREATE TABLE IF NOT EXISTS is idempotent)
spring.sql.init.mode=always

# SQLite does not support concurrent writers. One connection prevents locking errors.
spring.datasource.hikari.maximum-pool-size=1
# WAL mode allows concurrent reads while a write is in progress.
spring.datasource.hikari.connection-init-sql=PRAGMA journal_mode=WAL
